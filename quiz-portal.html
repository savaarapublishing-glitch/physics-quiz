<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quiz Portal für Physik Unterricht - gwiku18.at">
    <title>Physik Quiz Portal - gwiku18.at</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #6366f1;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --neutral-light: #f3f4f6;
            --neutral-medium: #e5e7eb;
            --neutral-dark: #6b7280;
            --text-dark: #1f2937;
            --text-light: #9ca3af;
            --surface-white: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--neutral-light);
            color: var(--text-dark);
            line-height: 1.6;
            height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--surface-white);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            padding: 32px 24px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-light);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--neutral-medium);
            border-radius: 8px;
            font-size: 16px;
            color: var(--text-dark);
            background: var(--surface-white);
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .button {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: none;
        }

        .button-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .button-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .button-secondary {
            background-color: var(--neutral-light);
            color: var(--text-dark);
            border: 2px solid var(--primary-color);
        }

        .button-secondary:hover {
            background-color: var(--primary-light);
            color: white;
        }

        .button-danger {
            background-color: var(--danger-color);
            color: white;
        }

        .button-danger:hover {
            background-color: #dc2626;
        }

        .button-success {
            background-color: var(--success-color);
            color: white;
        }

        .button-success:hover {
            background-color: #059669;
        }

        .button-small {
            padding: 10px 16px;
            font-size: 14px;
            width: auto;
        }

        .teacher-link {
            text-align: center;
            margin-top: 24px;
        }

        .teacher-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
        }

        .teacher-link a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .quiz-card {
            padding: 16px;
            border: 2px solid var(--neutral-medium);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .quiz-card:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .quiz-card h3 {
            font-size: 16px;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .quiz-card p {
            font-size: 13px;
            color: var(--text-light);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: var(--neutral-medium);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        .timer {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }

        .timer.warning {
            color: var(--warning-color);
            animation: pulse 1s infinite;
        }

        .timer.danger {
            color: var(--danger-color);
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .question-number {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .answer-option {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border: 2px solid var(--neutral-medium);
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--surface-white);
        }

        .answer-option:hover {
            border-color: var(--primary-color);
            background-color: var(--neutral-light);
        }

        .answer-option input[type="radio"],
        .answer-option input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .answer-option label {
            flex: 1;
            margin: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .fill-blank-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--neutral-medium);
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .button-group .button {
            flex: 1;
        }

        .result-card {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 24px;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .result-percentage {
            font-size: 24px;
            margin-bottom: 16px;
            opacity: 0.95;
        }

        .result-feedback {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .result-details {
            background: var(--neutral-light);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .result-details p {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .result-code-box {
            background: var(--surface-white);
            border: 2px dashed var(--primary-color);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-dark);
        }

        .trust-score {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 8px;
        }

        .trust-score.high {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
        }

        .trust-score.medium {
            background-color: rgba(245, 158, 11, 0.2);
            color: var(--warning-color);
        }

        .trust-score.low {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--danger-color);
        }

        .warning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .warning-box {
            background: white;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
        }

        .warning-box h2 {
            color: var(--danger-color);
            margin-bottom: 16px;
            font-size: 22px;
        }

        .warning-box p {
            color: var(--text-dark);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .teacher-mode-content {
            margin-top: 20px;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 20px;
            background: var(--surface-white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .results-table thead {
            background: var(--primary-color);
            color: white;
        }

        .results-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--primary-color);
        }

        .results-table td {
            padding: 12px;
            border-bottom: 1px solid var(--neutral-medium);
        }

        .results-table tbody tr:last-child td {
            border-bottom: none;
        }

        .results-table tbody tr:hover {
            background-color: var(--neutral-light);
        }

        .result-good {
            color: var(--success-color);
            font-weight: 600;
        }

        .result-warning {
            color: var(--warning-color);
            font-weight: 600;
        }

        .result-bad {
            color: var(--danger-color);
            font-weight: 600;
        }

        .textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--neutral-medium);
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            min-height: 120px;
            resize: vertical;
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .button-row .button {
            flex: 1;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
        }

        .modal {
            background: white;
            padding: 32px;
            border-radius: 12px;
            max-width: 400px;
            width: 100%;
            box-shadow: var(--shadow-lg);
        }

        .modal h2 {
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        .modal input {
            margin-bottom: 16px;
        }

        .copy-feedback {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success-color);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            animation: slideInDown 0.3s ease-out;
            z-index: 9000;
        }

        @keyframes slideInDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: 24px;
            }

            .timer {
                font-size: 20px;
            }

            .result-score {
                font-size: 40px;
            }

            .results-table {
                font-size: 12px;
            }

            .results-table th,
            .results-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN SCREEN -->
        <div id="loginScreen" class="screen">
            <div class="header">
                <h1>Physik Quiz</h1>
                <p>gwiku18.at</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="studentName">Name</label>
                    <input type="text" id="studentName" placeholder="Vorname Nachname" required>
                </div>
                <div class="form-group">
                    <label for="studentClass">Klasse</label>
                    <select id="studentClass" required>
                        <option value="">-- Wähle deine Klasse --</option>
                        <option value="6A">6A</option>
                        <option value="6B">6B</option>
                        <option value="7A">7A</option>
                        <option value="7B">7B</option>
                        <option value="8A">8A</option>
                        <option value="8B">8B</option>
                    </select>
                </div>
                <button type="submit" class="button button-primary">Quiz starten</button>
            </form>
            <div class="teacher-link">
                <a onclick="showTeacherPassword()">Lehrer-Modus</a>
            </div>
        </div>

        <!-- QUIZ SELECTION SCREEN -->
        <div id="quizSelectionScreen" class="screen hidden">
            <div class="header">
                <h1>Wähle ein Quiz</h1>
                <p id="welcomeText"></p>
            </div>
            <div class="quiz-grid" id="quizGrid"></div>
            <button class="button button-secondary" onclick="logout()">Abmelden</button>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quizScreen" class="screen hidden">
            <div class="timer" id="timer">10:00</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%;"></div>
            </div>
            <div class="question-number" id="questionNumber">Frage 1 von 10</div>
            <div class="question-text" id="questionText"></div>
            <div id="answersContainer"></div>
            <div class="button-group">
                <button class="button button-secondary" id="prevBtn" onclick="previousQuestion()">← Zurück</button>
                <button class="button button-primary" id="nextBtn" onclick="nextQuestion()">Weiter →</button>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="resultsScreen" class="screen hidden">
            <div class="header">
                <h1>Quiz abgeschlossen!</h1>
            </div>
            <div class="result-card">
                <div class="result-score" id="finalScore">16</div>
                <div class="result-percentage" id="percentageScore">80%</div>
                <div class="result-feedback" id="feedbackText"></div>
                <div class="trust-score" id="trustScoreBadge"></div>
            </div>
            <div class="result-details">
                <p><strong>Dein Ergebnis-Code:</strong></p>
                <div class="result-code-box" id="resultCode"></div>
                <p style="font-size: 12px; margin-top: 12px; color: var(--text-light);">
                    Schicke diesen Code an deinen Lehrer zur Überprüfung.
                </p>
            </div>
            <button class="button button-primary" onclick="copyResultCode()">Code kopieren</button>
            <button class="button button-secondary" style="margin-top: 12px;" onclick="logout()">Neue Quiz auswählen</button>
        </div>

        <!-- TEACHER MODE SCREEN -->
        <div id="teacherScreen" class="screen hidden">
            <div class="header">
                <h1>Lehrer-Dashboard</h1>
            </div>
            <div class="teacher-mode-content">
                <div class="form-group">
                    <label for="resultCodesInput">Ergebnis-Codes einfügen:</label>
                    <textarea id="resultCodesInput" class="textarea" placeholder="Codes hier einfügen (einer pro Zeile oder komma-getrennt)..."></textarea>
                </div>
                <div class="button-row">
                    <button class="button button-primary" onclick="decodeResults()">Codes auswerten</button>
                    <button class="button button-danger button-small" onclick="clearResults()">Tabelle leeren</button>
                </div>
                <div id="resultsTableContainer"></div>
                <div style="margin-top: 20px;">
                    <button class="button button-success" id="exportBtn" onclick="exportToExcel()" disabled>Als Excel exportieren</button>
                    <button class="button button-secondary" style="margin-top: 12px;" onclick="logout()">Abmelden</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PASSWORD MODAL -->
    <div id="passwordModal" class="modal-overlay hidden">
        <div class="modal">
            <h2>Lehrer-Modus</h2>
            <input type="password" id="teacherPassword" placeholder="Passwort eingeben" autocomplete="off">
            <div style="display: flex; gap: 12px;">
                <button class="button button-primary" onclick="verifyTeacherPassword()">Anmelden</button>
                <button class="button button-secondary" onclick="closeTeacherPassword()">Abbrechen</button>
            </div>
        </div>
    </div>

    <script>
        // ===== CONSTANTS & CONFIG =====
        const TEACHER_PASSWORD = 'TopicPhysik2024';
        const HEARTBEAT_INTERVAL = 2000;
        const INACTIVITY_TIMEOUT = 45000;
        const LEVENSHTEIN_DISTANCE = 1;

        // ===== DEMO QUIZZES DATA =====
        const DEMO_QUIZZES = [
            {
                id: 'mech-basics-001',
                title: 'Mechanik Grundlagen',
                timeLimit: 600,
                questions: [
                    {
                        id: 'q1',
                        type: 'multipleChoice',
                        text: 'Welche Einheit hat die Kraft?',
                        answers: ['Watt', 'Newton', 'Joule', 'Pascal'],
                        correctIndex: 1,
                        points: 2
                    },
                    {
                        id: 'q2',
                        type: 'multipleChoice',
                        text: 'Ein Auto fährt 120 km in 2 Stunden. Wie groß ist die Geschwindigkeit?',
                        answers: ['30 km/h', '60 km/h', '90 km/h', '120 km/h'],
                        correctIndex: 1,
                        points: 2
                    },
                    {
                        id: 'q3',
                        type: 'fillBlank',
                        text: 'Die Formel v = ___ / t beschreibt die Geschwindigkeit. Was gehört in die Lücke?',
                        correctAnswers: ['s'],
                        points: 2
                    },
                    {
                        id: 'q4',
                        type: 'multipleChoice',
                        text: 'Actio = Reactio beschreibt welches physikalische Gesetz?',
                        answers: ['1. Newtonsches Gesetz', '2. Newtonsches Gesetz', '3. Newtonsches Gesetz', 'Energieerhaltungssatz'],
                        correctIndex: 2,
                        points: 2
                    },
                    {
                        id: 'q5',
                        type: 'fillBlank',
                        text: 'Die Einheit der Energie ist ___.',
                        correctAnswers: ['Joule'],
                        points: 2
                    },
                    {
                        id: 'q6',
                        type: 'multipleChoice',
                        text: 'Was passiert mit einem Objekt, auf das keine Kraft wirkt?',
                        answers: ['Es wird langsamer', 'Es bewegt sich gleichförmig weiter', 'Es beschleunigt', 'Es ändert die Richtung'],
                        correctIndex: 1,
                        points: 2
                    },
                    {
                        id: 'q7',
                        type: 'multipleChoice',
                        text: 'Was beschreibt die Formel F = m · a?',
                        answers: ['Kraft = Masse · Beschleunigung', 'Kraft = Masse · Geschwindigkeit', 'Energie = Masse · Beschleunigung', 'Leistung = Masse · Beschleunigung'],
                        correctIndex: 0,
                        points: 2
                    },
                    {
                        id: 'q8',
                        type: 'fillBlank',
                        text: 'Die Erdbeschleunigung beträgt ungefähr ___ m/s².',
                        correctAnswers: ['9.81', '9,81'],
                        points: 2
                    }
                ]
            },
            {
                id: 'energy-work-001',
                title: 'Energie und Arbeit',
                timeLimit: 480,
                questions: [
                    {
                        id: 'q1',
                        type: 'multipleChoice',
                        text: 'Wie lautet die Formel für die kinetische Energie?',
                        answers: ['E = mgh', 'E = ½mv²', 'E = Fs', 'P = W/t'],
                        correctIndex: 1,
                        points: 2
                    },
                    {
                        id: 'q2',
                        type: 'fillBlank',
                        text: 'Die Einheit der Leistung ist ___.',
                        correctAnswers: ['Watt'],
                        points: 2
                    },
                    {
                        id: 'q3',
                        type: 'multipleChoice',
                        text: 'Wovon hängt die potentielle Energie ab?',
                        answers: ['Geschwindigkeit', 'Höhe', 'Temperatur', 'Farbe'],
                        correctIndex: 1,
                        points: 2
                    },
                    {
                        id: 'q4',
                        type: 'multipleChoice',
                        text: 'Wie viel Joule sind 1 kWh?',
                        answers: ['1000 J', '36000 J', '3600000 J', '360 J'],
                        correctIndex: 2,
                        points: 2
                    },
                    {
                        id: 'q5',
                        type: 'fillBlank',
                        text: 'Die Arbeit wird berechnet mit W = F · ___.',
                        correctAnswers: ['s'],
                        points: 2
                    },
                    {
                        id: 'q6',
                        type: 'multipleChoice',
                        text: 'Was besagt der Energieerhaltungssatz?',
                        answers: ['Energie geht verloren', 'Energie kann erzeugt werden', 'Energie wird nur umgewandelt', 'Energie nimmt immer zu'],
                        correctIndex: 2,
                        points: 2
                    }
                ]
            }
        ];

        // ===== STATE VARIABLES =====
        let currentScreen = 'login';
        let studentData = null;
        let currentQuizId = null;
        let currentQuiz = null;
        let currentQuestionIndex = 0;
        let studentAnswers = {};
        let randomizedQuestions = [];
        let randomizedAnswers = {};
        let quizStartTime = null;
        let quizEndTime = null;
        let timerInterval = null;
        let heartbeatInterval = null;
        let inactivityTimer = null;
        let antiCheatEvents = [];
        let trustScore = 100;
        let cheatWarningShown = false;
        let lastHeartbeat = Date.now();
        let decodedResults = [];

        // ===== ANTI-CHEAT SYSTEM =====
        function initializeAntiCheat() {
            antiCheatEvents = [];
            trustScore = 100;
            cheatWarningShown = false;
            lastHeartbeat = Date.now();

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    recordAntiCheatEvent('tab-switch', -15);
                }
            });

            window.addEventListener('blur', () => {
                recordAntiCheatEvent('focus-loss', -10);
            });

            window.addEventListener('focus', () => {
                resetInactivityTimer();
            });

            document.addEventListener('fullscreenchange', () => {
                if (!document.fullscreenElement) {
                    recordAntiCheatEvent('fullscreen-exit', -8);
                }
            });

            window.addEventListener('resize', () => {
                recordAntiCheatEvent('resize', -5);
            });

            document.addEventListener('copy', (e) => {
                recordAntiCheatEvent('copy-attempt', -3);
                e.preventDefault();
            });

            document.addEventListener('cut', (e) => {
                recordAntiCheatEvent('cut-attempt', -3);
                e.preventDefault();
            });

            document.addEventListener('paste', (e) => {
                recordAntiCheatEvent('paste-attempt', -3);
                e.preventDefault();
            });

            document.addEventListener('contextmenu', (e) => {
                recordAntiCheatEvent('right-click', -2);
                e.preventDefault();
            });

            heartbeatInterval = setInterval(() => {
                lastHeartbeat = Date.now();
            }, HEARTBEAT_INTERVAL);

            resetInactivityTimer();
            document.addEventListener('click', resetInactivityTimer);
            document.addEventListener('keypress', resetInactivityTimer);
            document.addEventListener('touchstart', resetInactivityTimer);

            window.addEventListener('orientationchange', () => {
                recordAntiCheatEvent('orientation-change', -5);
            });
        }

        function resetInactivityTimer() {
            if (inactivityTimer) clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                recordAntiCheatEvent('inactivity', -10);
            }, INACTIVITY_TIMEOUT);
        }

        function recordAntiCheatEvent(eventType, penalty) {
            if (currentScreen !== 'quiz') return;

            antiCheatEvents.push({
                type: eventType,
                timestamp: new Date().toISOString(),
                penalty: penalty
            });

            trustScore = Math.max(0, trustScore + penalty);

            if (!cheatWarningShown && trustScore < 70) {
                showCheatWarning(eventType);
                cheatWarningShown = true;
            }
        }

        function showCheatWarning(eventType) {
            const overlay = document.createElement('div');
            overlay.className = 'warning-overlay';
            overlay.innerHTML = `
                <div class="warning-box">
                    <h2>Achtung!</h2>
                    <p>Verdächtige Aktivität erkannt (${getEventTypeName(eventType)}).</p>
                    <p>Fortgesetzte Verstöße gegen die Quiz-Regeln können zu einer Invalidierung des Ergebnisses führen.</p>
                    <button class="button button-primary" onclick="this.parentElement.parentElement.remove(); uncheatWarning();">Verstanden</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        function uncheatWarning() {
            cheatWarningShown = false;
        }

        function getEventTypeName(eventType) {
            const names = {
                'tab-switch': 'Tab-Wechsel',
                'focus-loss': 'Fenster-Wechsel',
                'fullscreen-exit': 'Fullscreen beendet',
                'resize': 'Fenster-Größe geändert',
                'copy-attempt': 'Kopierversuch',
                'cut-attempt': 'Ausschneiden-Versuch',
                'paste-attempt': 'Einfügen-Versuch',
                'right-click': 'Rechtsklick',
                'inactivity': 'Inaktivität',
                'orientation-change': 'Orientierung geändert'
            };
            return names[eventType] || eventType;
        }

        // ===== SEEDED RANDOM NUMBER GENERATOR =====
        function seededRandom(seed) {
            const x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        }

        function shuffleArray(array, seed) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(seededRandom(seed + i) * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ===== LEVENSHTEIN DISTANCE =====
        function levenshteinDistance(str1, str2) {
            const track = Array(str2.length + 1).fill(null).map(() =>
                Array(str1.length + 1).fill(null)
            );
            for (let i = 0; i <= str1.length; i += 1) {
                track[0][i] = i;
            }
            for (let j = 0; j <= str2.length; j += 1) {
                track[j][0] = j;
            }
            for (let j = 1; j <= str2.length; j += 1) {
                for (let i = 1; i <= str1.length; i += 1) {
                    const indicator = str1[i - 1] === str2[j - 1] ? 0 : 1;
                    track[j][i] = Math.min(
                        track[j][i - 1] + 1,
                        track[j - 1][i] + 1,
                        track[j - 1][i - 1] + indicator
                    );
                }
            }
            return track[str2.length][str1.length];
        }

        function normalizeAnswer(answer) {
            return answer
                .toLowerCase()
                .trim()
                .replace(/,/g, '.')
                .replace(/\s+/g, ' ');
        }

        function checkFillBlankAnswer(studentAnswer, correctAnswers) {
            const normalized = normalizeAnswer(studentAnswer);
            return correctAnswers.some(correct => {
                const normalizedCorrect = normalizeAnswer(correct);
                return levenshteinDistance(normalized, normalizedCorrect) <= LEVENSHTEIN_DISTANCE;
            });
        }

        // ===== UI SCREEN MANAGEMENT =====
        function showScreen(screenName) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.add('hidden');
            });
            document.getElementById(screenName + 'Screen').classList.remove('hidden');
            currentScreen = screenName;
        }

        // ===== LOGIN FLOW =====
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('studentName').value.trim();
            const klasse = document.getElementById('studentClass').value;

            if (!name || !klasse) {
                alert('Bitte alle Felder ausfüllen!');
                return;
            }

            studentData = { name, klasse };
            displayQuizSelection();
            showScreen('quizSelection');
        });

        function displayQuizSelection() {
            document.getElementById('welcomeText').textContent = `Willkommen, ${studentData.name}!`;
            const quizGrid = document.getElementById('quizGrid');
            quizGrid.innerHTML = '';

            DEMO_QUIZZES.forEach(quiz => {
                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.innerHTML = `
                    <h3>${quiz.title}</h3>
                    <p>${quiz.questions.length} Fragen • ${Math.ceil(quiz.timeLimit / 60)} Minuten</p>
                `;
                card.onclick = () => startQuiz(quiz.id);
                quizGrid.appendChild(card);
            });
        }

        // ===== QUIZ FLOW =====
        function startQuiz(quizId) {
            currentQuizId = quizId;
            currentQuiz = DEMO_QUIZZES.find(q => q.id === quizId);
            currentQuestionIndex = 0;
            studentAnswers = {};
            antiCheatEvents = [];

            const seed = studentData.name.charCodeAt(0) + quizId.charCodeAt(0);
            randomizedQuestions = shuffleArray(currentQuiz.questions, seed);

            randomizedAnswers = {};
            randomizedQuestions.forEach((q, idx) => {
                if (q.type === 'multipleChoice') {
                    const questionSeed = seed + idx;
                    const shuffled = shuffleArray(
                        q.answers.map((ans, idx) => ({ text: ans, originalIndex: idx })),
                        questionSeed
                    );
                    randomizedAnswers[q.id] = shuffled;
                }
            });

            quizStartTime = Date.now();
            initializeAntiCheat();
            displayQuestion();
            showScreen('quiz');
            startTimer();
        }

        function displayQuestion() {
            const question = randomizedQuestions[currentQuestionIndex];
            document.getElementById('questionNumber').textContent = `Frage ${currentQuestionIndex + 1} von ${randomizedQuestions.length}`;
            document.getElementById('questionText').textContent = question.text;

            const container = document.getElementById('answersContainer');
            container.innerHTML = '';

            if (question.type === 'multipleChoice') {
                const shuffled = randomizedAnswers[question.id];
                shuffled.forEach((item, idx) => {
                    const label = document.createElement('label');
                    label.className = 'answer-option';
                    label.innerHTML = `
                        <input type="radio" name="answer" value="${idx}"
                            ${studentAnswers[question.id] === idx ? 'checked' : ''}>
                        <span>${item.text}</span>
                    `;
                    label.onclick = () => {
                        studentAnswers[question.id] = idx;
                    };
                    container.appendChild(label);
                });
            } else if (question.type === 'fillBlank') {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'fill-blank-input';
                input.placeholder = 'Antworte hier...';
                input.value = studentAnswers[question.id] || '';
                input.onchange = () => {
                    studentAnswers[question.id] = input.value;
                };
                container.appendChild(input);
            }

            updateProgressBar();
            updateButtons();
        }

        function updateProgressBar() {
            const progress = ((currentQuestionIndex + 1) / randomizedQuestions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateButtons() {
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            document.getElementById('nextBtn').textContent = currentQuestionIndex === randomizedQuestions.length - 1 ? 'Beenden' : 'Weiter →';
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < randomizedQuestions.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            } else {
                endQuiz();
            }
        }

        function startTimer() {
            let secondsLeft = currentQuiz.timeLimit;
            timerInterval = setInterval(() => {
                secondsLeft--;
                const minutes = Math.floor(secondsLeft / 60);
                const seconds = secondsLeft % 60;
                const display = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                const timerEl = document.getElementById('timer');
                timerEl.textContent = display;

                if (secondsLeft <= 60) {
                    timerEl.classList.remove('warning');
                    timerEl.classList.add('danger');
                } else if (secondsLeft <= 180) {
                    timerEl.classList.add('warning');
                } else {
                    timerEl.classList.remove('warning', 'danger');
                }

                if (secondsLeft <= 0) {
                    clearInterval(timerInterval);
                    endQuiz();
                }
            }, 1000);
        }

        function endQuiz() {
            clearInterval(timerInterval);
            clearInterval(heartbeatInterval);
            if (inactivityTimer) clearTimeout(inactivityTimer);
            quizEndTime = Date.now();

            calculateResults();
            showScreen('results');
        }

        // ===== SCORING & RESULTS =====
        function calculateResults() {
            let score = 0;
            let maxScore = 0;

            randomizedQuestions.forEach(question => {
                maxScore += question.points;

                if (question.type === 'multipleChoice') {
                    const shuffled = randomizedAnswers[question.id];
                    const studentAnswerIndex = studentAnswers[question.id];
                    if (studentAnswerIndex !== undefined) {
                        const selectedItem = shuffled[studentAnswerIndex];
                        if (selectedItem.originalIndex === question.correctIndex) {
                            score += question.points;
                        }
                    }
                } else if (question.type === 'fillBlank') {
                    const studentAnswer = studentAnswers[question.id] || '';
                    if (checkFillBlankAnswer(studentAnswer, question.correctAnswers)) {
                        score += question.points;
                    }
                }
            });

            const percentage = Math.round((score / maxScore) * 100);

            document.getElementById('finalScore').textContent = `${score}/${maxScore}`;
            document.getElementById('percentageScore').textContent = `${percentage}%`;

            if (percentage >= 80) {
                document.getElementById('feedbackText').textContent = 'Ausgezeichnet!';
            } else if (percentage >= 60) {
                document.getElementById('feedbackText').textContent = 'Gute Leistung!';
            } else {
                document.getElementById('feedbackText').textContent = 'Mehr üben!';
            }

            const trustBadge = document.getElementById('trustScoreBadge');
            let trustClass = 'high';
            if (trustScore < 70) trustClass = 'low';
            else if (trustScore < 85) trustClass = 'medium';
            trustBadge.className = `trust-score ${trustClass}`;
            trustBadge.textContent = `Vertrauenswürdigkeit: ${trustScore}%`;

            const resultData = {
                name: studentData.name,
                klasse: studentData.klasse,
                quizId: currentQuizId,
                quizTitle: currentQuiz.title,
                score: score,
                maxScore: maxScore,
                trustScore: trustScore,
                antiCheatEvents: antiCheatEvents.length,
                timestamp: new Date().toISOString()
            };

            const resultCode = btoa(JSON.stringify(resultData));
            document.getElementById('resultCode').textContent = resultCode;
        }

        function copyResultCode() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                showCopyFeedback();
            });
        }

        function showCopyFeedback() {
            const feedback = document.createElement('div');
            feedback.className = 'copy-feedback';
            feedback.textContent = 'Code kopiert!';
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 3000);
        }

        // ===== TEACHER MODE =====
        function showTeacherPassword() {
            document.getElementById('passwordModal').classList.remove('hidden');
            document.getElementById('teacherPassword').focus();
        }

        function closeTeacherPassword() {
            document.getElementById('passwordModal').classList.add('hidden');
            document.getElementById('teacherPassword').value = '';
        }

        function verifyTeacherPassword() {
            const password = document.getElementById('teacherPassword').value;
            if (password === TEACHER_PASSWORD) {
                closeTeacherPassword();
                decodedResults = [];
                showScreen('teacher');
            } else {
                alert('Passwort falsch!');
                document.getElementById('teacherPassword').value = '';
            }
        }

        document.getElementById('teacherPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyTeacherPassword();
        });

        function decodeResults() {
            const input = document.getElementById('resultCodesInput').value;
            if (!input.trim()) {
                alert('Bitte Codes einfügen!');
                return;
            }

            const codes = input
                .split(/[\n,;]/)
                .map(c => c.trim())
                .filter(c => c.length > 0);

            decodedResults = [];
            codes.forEach(code => {
                try {
                    const decoded = JSON.parse(atob(code));
                    decodedResults.push(decoded);
                } catch (e) {
                    console.error('Invalid code:', code);
                }
            });

            displayResultsTable();
            document.getElementById('exportBtn').disabled = decodedResults.length === 0;
        }

        function displayResultsTable() {
            const container = document.getElementById('resultsTableContainer');
            if (decodedResults.length === 0) {
                container.innerHTML = '<p style="color: var(--text-light); margin-top: 20px;">Noch keine Ergebnisse.</p>';
                return;
            }

            let html = '<table class="results-table"><thead><tr><th>Name</th><th>Klasse</th><th>Quiz</th><th>Punkte</th><th>Max</th><th>%</th><th>Trust</th><th>Zeit</th></tr></thead><tbody>';

            decodedResults.forEach(result => {
                const percentage = Math.round((result.score / result.maxScore) * 100);
                let percentClass = 'result-good';
                if (percentage < 60) percentClass = 'result-bad';
                else if (percentage < 80) percentClass = 'result-warning';

                let trustClass = 'result-good';
                if (result.trustScore < 70) trustClass = 'result-bad';
                else if (result.trustScore < 85) trustClass = 'result-warning';

                const timestamp = new Date(result.timestamp).toLocaleDateString('de-AT', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                html += `<tr>
                    <td>${result.name}</td>
                    <td>${result.klasse}</td>
                    <td>${result.quizTitle}</td>
                    <td>${result.score}</td>
                    <td>${result.maxScore}</td>
                    <td class="${percentClass}">${percentage}%</td>
                    <td class="${trustClass}">${result.trustScore}%</td>
                    <td>${timestamp}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function exportToExcel() {
            if (decodedResults.length === 0) return;

            const data = decodedResults.map(result => ({
                'Name': result.name,
                'Klasse': result.klasse,
                'Quiz': result.quizTitle,
                'Punkte': result.score,
                'Max Punkte': result.maxScore,
                'Prozent': Math.round((result.score / result.maxScore) * 100),
                'Trust Score': result.trustScore,
                'Anti-Cheat Events': result.antiCheatEvents,
                'Zeitstempel': new Date(result.timestamp).toLocaleString('de-AT')
            }));

            const workbook = XLSX.utils.book_new();
            const worksheet = XLSX.utils.json_to_sheet(data);

            worksheet['!cols'] = [
                { wch: 20 },
                { wch: 10 },
                { wch: 25 },
                { wch: 8 },
                { wch: 12 },
                { wch: 8 },
                { wch: 12 },
                { wch: 20 },
                { wch: 25 }
            ];

            const range = XLSX.utils.decode_range(worksheet['!ref']);
            for (let C = range.s.c; C <= range.e.c; ++C) {
                const address = XLSX.utils.encode_col(C) + '1';
                if (!worksheet[address]) continue;
                worksheet[address].s = { font: { bold: true, color: { rgb: 'FFFFFFFF' } }, fill: { fgColor: { rgb: 'FF4F46E5' } } };
            }

            XLSX.utils.book_append_sheet(workbook, worksheet, 'Ergebnisse');

            const timestamp = new Date().toLocaleDateString('de-AT').replace(/\./g, '-');
            const filename = `Quiz_Ergebnisse_${timestamp}.xlsx`;
            XLSX.writeFile(workbook, filename);
        }

        function clearResults() {
            if (confirm('Tabelle wirklich leeren?')) {
                decodedResults = [];
                document.getElementById('resultCodesInput').value = '';
                document.getElementById('resultsTableContainer').innerHTML = '';
                document.getElementById('exportBtn').disabled = true;
            }
        }

        function logout() {
            currentScreen = 'login';
            studentData = null;
            currentQuizId = null;
            studentAnswers = {};
            antiCheatEvents = [];
            document.getElementById('loginForm').reset();
            document.getElementById('studentName').focus();
            showScreen('login');
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('studentName').focus();
        });

        document.addEventListener('keydown', (e) => {
            if (currentScreen === 'quiz') {
                if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 's' || e.key === 'p')) {
                    recordAntiCheatEvent('keyboard-shortcut', -5);
                    e.preventDefault();
                }
            }
        });
    </script>
</body>
</html>
